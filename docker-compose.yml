version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: waawy_postgres
    restart: always
    environment:
      POSTGRES_USER: waawy
      POSTGRES_PASSWORD: waawy_dev_password
      POSTGRES_DB: waawy_hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
